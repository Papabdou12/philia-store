name: Staging — Deploy & Lighthouse

on:
  push:
    branches: [develop]

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Deploy Staging (Vercel)
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build staging
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_STAGING }}
          VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY_STAGING }}
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL_STAGING }}
          VITE_SITE_NAME: "Philia'Store [STAGING]"
          VITE_STORE_PHONE: ${{ secrets.VITE_STORE_PHONE }}
          VITE_STORE_WHATSAPP: ${{ secrets.VITE_STORE_WHATSAPP }}
          VITE_STORE_EMAIL: ${{ secrets.VITE_STORE_EMAIL }}
          VITE_STORE_ADDRESS: ${{ secrets.VITE_STORE_ADDRESS }}
          VITE_STORE_FACEBOOK: ${{ secrets.VITE_STORE_FACEBOOK }}
          VITE_STORE_INSTAGRAM: ${{ secrets.VITE_STORE_INSTAGRAM }}
          VITE_STORE_TWITTER: ${{ secrets.VITE_STORE_TWITTER }}
          VITE_STORE_TIKTOK: ${{ secrets.VITE_STORE_TIKTOK }}
        run: npm run build

      - name: Deploy sur Vercel (staging)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel deploy dist/ \
            --token=$VERCEL_TOKEN \
            --scope=$VERCEL_ORG_ID \
            --yes \
            --env VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL_STAGING }} \
            2>&1 | tee deploy-output.txt
          URL=$(grep -o 'https://[^ ]*vercel.app' deploy-output.txt | head -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Staging déployé : $URL"

  # ── Lighthouse CI sur l'URL de staging ────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: needs.deploy-staging.outputs.url != ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Lighthouse audit
        run: |
          lhci autorun \
            --collect.url=${{ needs.deploy-staging.outputs.url }} \
            --collect.numberOfRuns=2 \
            --assert.preset=lighthouse:recommended \
            --assert.assertions.categories:performance.minScore=0.6 \
            --assert.assertions.categories:accessibility.minScore=0.8 \
            --assert.assertions.categories:best-practices.minScore=0.8 \
            --assert.assertions.categories:seo.minScore=0.8 \
            --upload.target=temporary-public-storage
        continue-on-error: true  # ne bloque pas le pipeline mais remonte les scores

      - name: Commentaire PR avec scores Lighthouse
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const results = JSON.parse(fs.readFileSync('.lighthouseci/assertion-results.json', 'utf8'));
              const scores = results.map(r => `- ${r.name}: ${r.actual}`).join('\n');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## Lighthouse CI — Staging\n\n${scores}`
              });
            } catch(e) {
              console.log('Pas de résultats Lighthouse à afficher');
            }
