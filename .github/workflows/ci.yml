name: CI — Lint & Build

on:
  push:
    branches: [prod, develop, 'feature/**', 'fix/**', 'chore/**']
  pull_request:
    branches: [prod, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build:
    name: Lint + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (vérification syntaxique)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_STAGING }}
          VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY_STAGING }}
          VITE_BASE_URL: https://staging.philiastore.sn
          VITE_SITE_NAME: "Philia'Store"
          VITE_STORE_PHONE: ""
          VITE_STORE_WHATSAPP: ""
          VITE_STORE_EMAIL: ""
          VITE_STORE_ADDRESS: ""
          VITE_STORE_FACEBOOK: ""
          VITE_STORE_INSTAGRAM: ""
          VITE_STORE_TWITTER: ""
          VITE_STORE_TIKTOK: ""
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 1
